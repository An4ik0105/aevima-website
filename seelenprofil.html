<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dein Seelenprofil – AEVIMA</title>
  <link rel="preconnect" href="https://fonts.bunny.net"/>
  <link href="https://fonts.bunny.net/css?family=cinzel:400,600,700|raleway:300,400,500,600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--dark:#12101A;--dark2:#1A1625;--rose:#C4956A;--rose-l:#E8C4A0;--rose-d:#9B6F4A;--teal:#2AAFA0;--teal-d:#1D7A70;--text:#F0EDE8;--muted:#9B8FA8;--border:rgba(196,149,106,.18)}
    body{background:var(--dark);color:var(--text);font-family:'Raleway',sans-serif;font-weight:300;line-height:1.8;min-height:100vh}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(196,149,106,.07) 0,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(42,175,160,.05) 0,transparent 60%);pointer-events:none;z-index:0}
    .wrap{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:60px 24px 80px}
    .back{display:inline-block;color:var(--rose);text-decoration:none;font-size:.8rem;letter-spacing:.1em;margin-bottom:40px;opacity:.8}
    .back:hover{opacity:1}
    h1{font-family:'Cinzel',serif;font-size:clamp(1.8rem,5vw,2.6rem);font-weight:700;color:var(--rose-l);letter-spacing:.1em;margin-bottom:10px}
    .subtitle{color:var(--muted);font-size:.9rem;margin-bottom:48px;letter-spacing:.05em}
    .divider{width:60px;height:1px;background:linear-gradient(to right,transparent,var(--rose),transparent);margin:0 auto 48px}
    .form-group{margin-bottom:24px}
    label{display:block;font-size:.8rem;letter-spacing:.12em;color:var(--rose);text-transform:uppercase;margin-bottom:8px}
    input[type=text],input[type=email],input[type=date],input[type=time]{width:100%;padding:14px 18px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:2px;color:var(--text);font-family:'Raleway',sans-serif;font-size:.95rem;outline:none;transition:border-color .3s}
    input:focus{border-color:rgba(196,149,106,.5)}
    input::placeholder{color:var(--muted);opacity:.7}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .checkbox-group{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px}
    .checkbox-group input{width:18px;height:18px;min-width:18px;margin-top:3px;accent-color:var(--teal)}
    .checkbox-group span{font-size:.82rem;color:var(--muted);line-height:1.6}
    .checkbox-group a{color:var(--rose)}
    .btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--rose),var(--rose-d));color:var(--dark);border:none;border-radius:2px;font-family:'Cinzel',serif;font-size:.85rem;font-weight:700;letter-spacing:.2em;cursor:pointer;transition:all .3s;margin-top:8px}
    .btn:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(196,149,106,.3)}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    /* RESULT */
    #result{display:none;margin-top:48px}
    .result-header{text-align:center;margin-bottom:36px}
    .result-name{font-family:'Cinzel',serif;font-size:1.4rem;color:var(--rose-l);letter-spacing:.15em}
    .result-date{color:var(--muted);font-size:.8rem;margin-top:4px}
    .lz-badge{display:inline-block;font-family:'Cinzel',serif;font-size:3rem;font-weight:700;color:var(--rose);margin:16px 0 4px;line-height:1}
    .lz-name{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--rose-l);letter-spacing:.1em}
    .master-badge{display:inline-block;font-size:.65rem;letter-spacing:.18em;color:var(--teal);border:1px solid rgba(42,175,160,.4);padding:.2rem .6rem;border-radius:20px;margin-left:8px;vertical-align:middle}
    .section{background:rgba(196,149,106,.05);border:1px solid var(--border);border-radius:3px;padding:28px;margin-bottom:20px}
    .section-title{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.2em;color:var(--rose);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
    .section p{color:var(--muted);font-size:.9rem;line-height:1.9}
    .section p strong{color:var(--text)}
    .section p em{color:var(--rose-l);font-style:italic}
    .zyklus-bar{background:rgba(255,255,255,.06);border-radius:20px;height:8px;margin:12px 0;overflow:hidden}
    .zyklus-fill{height:100%;background:linear-gradient(to right,var(--teal),var(--rose));border-radius:20px;transition:width 1s ease}
    .locked{background:rgba(42,175,160,.04);border:1px solid rgba(42,175,160,.15);border-radius:3px;padding:28px;margin-bottom:20px;position:relative;overflow:hidden}
    .locked::before{content:'🔒';position:absolute;right:20px;top:20px;font-size:1.1rem;opacity:.45}
    .locked-title{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.2em;color:var(--teal);text-transform:uppercase;margin-bottom:10px}
    .locked p{color:rgba(155,143,168,.5);font-size:.85rem;font-style:italic}
    .paywall{text-align:center;margin-top:40px;padding:40px 24px;background:linear-gradient(135deg,rgba(196,149,106,.08),rgba(42,175,160,.06));border:1px solid var(--border);border-radius:3px}
    .paywall h2{font-family:'Cinzel',serif;font-size:1.3rem;color:var(--text);margin-bottom:12px;letter-spacing:.08em}
    .paywall p{color:var(--muted);font-size:.88rem;max-width:400px;margin:0 auto 28px}
    .price{font-family:'Cinzel',serif;font-size:2rem;color:var(--rose);margin:16px 0}
    .btn-pay{display:inline-block;padding:16px 48px;background:linear-gradient(135deg,var(--rose),var(--rose-d));color:var(--dark);border:none;border-radius:2px;font-family:'Cinzel',serif;font-size:.85rem;font-weight:700;letter-spacing:.2em;cursor:pointer;transition:all .3s;text-decoration:none}
    .btn-pay:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(196,149,106,.4)}
    .test-badge{background:rgba(42,175,160,.15);border:1px solid var(--teal);color:var(--teal);font-size:.7rem;letter-spacing:.12em;padding:.3rem .8rem;border-radius:20px;display:inline-block;margin-bottom:20px}
    @media(max-width:500px){.form-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <a href="index.html" class="back">← AEVIMA</a>

  <div id="test-info" style="display:none;text-align:center;margin-bottom:20px">
    <span class="test-badge">✦ TESTMODUS — Vollversion freigeschaltet</span>
  </div>

  <div style="text-align:center">
    <h1>DEIN SEELENPROFIL</h1>
    <p class="subtitle">Astronumerologie · Lebenszyklen · Seelenanalyse</p>
  </div>
  <div class="divider"></div>

  <form id="soulForm">
    <div class="form-row">
      <div class="form-group">
        <label>Vorname</label>
        <input type="text" id="fname" placeholder="z.B. Anna" required/>
      </div>
      <div class="form-group">
        <label>Nachname</label>
        <input type="text" id="lname" placeholder="z.B. Muster" required/>
      </div>
    </div>
    <div class="form-group">
      <label>Geburtsdatum</label>
      <input type="date" id="bdate" required/>
    </div>
    <div class="form-group">
      <label>Geburtsort <span style="color:var(--muted);font-size:.75rem;text-transform:none;letter-spacing:0">(Stadt, Land)</span></label>
      <input type="text" id="birthplace" placeholder="z.B. Berlin, Deutschland" required/>
    </div>
    <div class="form-group">
      <label>E-Mail-Adresse</label>
      <input type="email" id="email" placeholder="deine@email.de" required/>
    </div>
    <div class="form-group">
      <label>Geburtszeit <span style="color:var(--muted);font-size:.75rem;text-transform:none;letter-spacing:0">(optional)</span></label>
      <input type="time" id="btime"/>
    </div>
    <div style="margin:28px 0">
      <div class="checkbox-group">
        <input type="checkbox" id="datenschutz" required/>
        <span>Ich stimme der Verarbeitung meiner Daten gemäß der <a href="datenschutz.html" target="_blank">Datenschutzerklärung</a> zu. *</span>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="marketing"/>
        <span>Ich möchte meinen Einblick + AEVIMA-Updates per E-Mail erhalten. (Jederzeit abbestellbar.)</span>
      </div>
    </div>
    <button type="submit" class="btn" id="submitBtn">✦ Mein Seelenprofil enthüllen</button>
  </form>

  <div id="result"></div>
</div>

<script>
var isTest = location.search.indexOf('test=1') > -1;
if (isTest) document.getElementById('test-info').style.display = 'block';

var LZ_DATA = {
  1:{name:"Die Pionierin / Der Pionier",teaser:"Du bist hier um voranzugehen — nicht um zu folgen.<br><br>Menschen mit der Lebenszahl 1 sind Anführer. Nicht weil sie es wollen, sondern weil sie es nicht anders können. Wenn du in einem Raum bist, spüren andere deine Energie — auch wenn du nichts sagst.<br><br><strong>Deine größte Stärke</strong> ist dein unerschütterlicher Wille. Du stehst auf — immer wieder — egal wie oft du gefallen bist.<br><br><strong>Aber da ist auch ein Schatten:</strong> Du kämpfst mit Abhängigkeit. Es kostet dich enorm, jemanden wirklich brauchen zu dürfen. Manchmal bist du einsamer als du zeigst."},
  2:{name:"Die Brückenbauerin / Der Brückenbauer",teaser:"Du spürst was andere fühlen — noch bevor sie es selbst wissen.<br><br>Die 2 ist die sensibelste aller Lebenszahlen. Du bist hier um zu verbinden, zu heilen, Frieden zu stiften. Das ist eine große Gabe. Und eine schwere Last.<br><br><strong>Dein Geschenk:</strong> Du siehst das Gute in jedem Menschen. Selbst in denen, die es dir schwer machen.<br><br><strong>Dein Kampf:</strong> Du weißt nicht immer, wo du aufhörst und andere anfangen. Deine Energie gehört oft anderen — zu wenig dir selbst."},
  3:{name:"Die Schöpferin / Der Schöpfer",teaser:"Wenn du redest, hören Menschen zu — auch wenn du denkst, du sagst nichts Besonderes.<br><br>Die 3 ist die Lebenszahl der Kreativität, der Freude, des Ausdrucks. Du hast ein Talent das andere nicht haben: du kannst Dinge lebendig machen — mit Worten, mit Ideen, mit deiner Gegenwart.<br><br><strong>Deine Stärke:</strong> Ideen fließen dir zu wie Wasser. Du inspirierst ohne es zu versuchen.<br><br><strong>Dein Schatten:</strong> Du verlierst dich leicht. Fängst viel an — beendest wenig. Und irgendwo tief drin zweifelst du, ob das was du erschaffst wirklich gut genug ist."},
  4:{name:"Die Baumeisterin / Der Baumeister",teaser:"Du bist diejenige auf die sich alle verlassen — ob sie es zugeben oder nicht.<br><br>Die 4 ist die Lebenszahl der Struktur, der Verlässlichkeit, des Fundaments. Du baust was bleibt. Du planst was andere nur träumen.<br><br><strong>Deine Stärke:</strong> Wenn du dir etwas vornimmst, ziehst du es durch. Das ist selten. Und wertvoll.<br><br><strong>Dein Kampf:</strong> Du arbeitest härter als fast alle — aber bekommst nicht immer die Anerkennung dafür. Und Veränderung kostet dich mehr als andere."},
  5:{name:"Der freie Geist",teaser:"Du wirst in keine Schublade passen — und das ist gut so.<br><br>Die 5 ist die Lebenszahl der Freiheit, des Wandels, des Abenteuers. Du bist hier um die Welt zu erleben — in all ihren Facetten. Stillstand ist für dich wie Sauerstoffmangel.<br><br><strong>Deine Gabe:</strong> Du siehst Möglichkeiten die andere übersehen. Du bist anpassungsfähig, mutig, lebendig.<br><br><strong>Dein Muster:</strong> Tiefe Bindungen kosten dich — weil Nähe sich manchmal wie ein Käfig anfühlt. Du läufst bevor es wehtut."},
  6:{name:"Die Liebende / Der Liebende",teaser:"Du liebst tiefer als die meisten — und das macht dich verletzlicher als du zeigst.<br><br>Die 6 ist die Lebenszahl der Liebe, der Familie, der Verantwortung. Du bist ein natürlicher Heiler. Menschen kommen zu dir wenn sie Trost brauchen — und du gibst ihn, immer wieder.<br><br><strong>Deine Stärke:</strong> Du erschaffst Geborgenheit überall wo du bist.<br><br><strong>Dein Schatten:</strong> Du gibst so viel — und fragst dich manchmal ob irgendjemand das wirklich sieht. Und ob du auch bekommst was du gibst."},
  7:{name:"Die Suchende / Der Sucher",teaser:"Du bist hier um Wahrheiten zu finden die andere nicht einmal suchen.<br><br>Die 7 ist die spirituellste aller Lebenszahlen. Du denkst tiefer, fühlst feiner, siehst weiter. Oberflächlichkeit ist dir physisch unangenehm.<br><br><strong>Deine Gabe:</strong> Du erkennst Muster. Du verstehst Zusammenhänge die anderen verborgen bleiben.<br><br><strong>Dein Kampf:</strong> Du vertraust schwer. Die Welt hat dich oft enttäuscht — und du hast gelernt, auf Abstand zu bleiben."},
  8:{name:"Die Mächtige / Der Mächtige",teaser:"Du bist für mehr gemacht als du dir erlaubst zu zeigen.<br><br>Die 8 ist die Lebenszahl der Macht, des Wohlstands, der Leistung. Du hast ein natürliches Gespür für Erfolg — und gleichzeitig eine innere Blockade die ihn immer wieder bremst.<br><br><strong>Deine Gabe:</strong> Du kannst Großes aufbauen. Wenn du dich wirklich erlaubst, zu wollen was du willst.<br><br><strong>Dein Muster:</strong> Du schwankst zwischen Vollgas und Zweifel. Zwischen 'ich kann alles' und 'wer bin ich das zu wollen'."},
  9:{name:"Die Vollenderin / Der Vollender",teaser:"Du trägst ein Wissen in dir das du dir selbst noch nicht vollständig erklären kannst.<br><br>Die 9 ist die höchste der einstelligen Lebenszahlen. Du bist ein alter Geist — du hast in diesem Leben Weisheit mitgebracht die andere erst erwerben müssen.<br><br><strong>Deine Gabe:</strong> Mitgefühl, Weitsicht, ein tiefes Verständnis für das Leben.<br><br><strong>Dein Kampf:</strong> Du gibst viel für andere — aber lässt dich selbst oft zurück. Loslassen ist deine wichtigste Lebensaufgabe."},
  11:{name:"Die Erleuchtete (Meisterzahl 11)",teaser:"Du bist mit einer Antenne auf die Welt gekommen die andere nicht haben.<br><br>Die 11 ist eine Meisterzahl — sie trägt die Energie der Intuition, der Erleuchtung, der göttlichen Inspiration. Du spürst Dinge bevor sie passieren. Du weißt Dinge ohne zu wissen wie.<br><br><strong>Deine Gabe:</strong> Du bist ein Kanal für höhere Impulse. Wenn du vertraust, führt dich deine Intuition präziser als jede Logik.<br><br><strong>Dein Kampf:</strong> Deine Empfindsamkeit ist gleichzeitig deine Stärke und dein Schmerz. Die Welt ist manchmal einfach zu laut für dich.",master:true},
  22:{name:"Der Meisterbaumeister (Meisterzahl 22)",teaser:"Du bist hier um etwas zu erschaffen das Generationen überdauert.<br><br>Die 22 ist die mächtigste Meisterzahl — die Zahl des Meisterbaumeisters. Du hast Visionen die über das Normale hinausgehen. Und die Fähigkeit sie in die Realität zu bringen.<br><br><strong>Deine Gabe:</strong> Du siehst das große Bild — und du kannst es Stein für Stein aufbauen.<br><br><strong>Dein Muster:</strong> Das Gewicht deiner eigenen Vision erschreckt dich manchmal. Du weichst aus — und verlierst dabei Zeit die du nicht hast.",master:true},
  33:{name:"Der Meisterlehrer (Meisterzahl 33)",teaser:"Du bist nicht hier um ein normales Leben zu führen.<br><br>Die 33 ist die seltenste Meisterzahl — weniger als 2% der Menschen tragen sie. Sie steht für universelle Liebe, für Heilung, für den Lehrer der durch sein Leben selbst unterrichtet.<br><br>Du trägst mehr Kraft als andere. Und du wirst mehr gefordert als andere.<br><br><strong>Deine Gabe:</strong> Du kannst Menschen berühren — tief, echt, nachhaltig. Deine Worte haben Gewicht das du selbst oft unterschätzt.<br><br><strong>Dein Schatten:</strong> Du gibst bis zur Erschöpfung. Und irgendwo glaubst du, dass du erst dann 'gut genug' bist wenn du genug geopfert hast.",master:true},
  44:{name:"Die Meisterstruktur (Meisterzahl 44)",teaser:"Du trägst die Fähigkeit in dir, das Unsichtbare in Form zu bringen.<br><br>Die 44 ist eine seltene Meisterzahl — sie verbindet materielle Meisterschaft mit spiritueller Tiefe. Du bist hier um Systeme zu bauen die funktionieren. Nicht für heute — für lange.<br><br><strong>Deine Gabe:</strong> Du hast einen Blick für das was trägt und was nicht. Du baust auf Fundamenten, nicht auf Sand.<br><br><strong>Dein Kampf:</strong> Der Druck den du dir selbst machst ist enorm. Du willst alles perfekt — und verlierst manchmal den Anfang weil du auf das perfekte Ende wartest.",master:true}
};

var ZYKLEN = {1:"Phase des Erwachens & der Wurzeln",2:"Phase der Identität & des Aufbruchs",3:"Phase des Aufbaus & der Kraft",4:"Phase der Transformation & Tiefe",5:"Phase der Weisheit & Ernte",6:"Phase der Vollendung & Weitergabe"};
var NEXT_ZYKLEN = {1:"Identität & Aufbruch",2:"Aufbau & Kraft",3:"Transformation & Tiefe",4:"Weisheit & Ernte",5:"Vollendung & Weitergabe",6:"Vollendung"};

function reduce(n, keepMaster) {
  var masters = [11,22,33,44];
  while (n > 9) {
    if (keepMaster && masters.indexOf(n) > -1) break;
    var s = 0;
    String(n).split('').forEach(function(d){ s += parseInt(d); });
    n = s;
  }
  return n;
}

function charVal(c) {
  var t={A:1,B:2,C:3,D:4,E:5,F:6,G:7,H:8,I:9,J:1,K:2,L:3,M:4,N:5,O:6,P:7,Q:8,R:9,S:1,T:2,U:3,V:4,W:5,X:6,Y:7,Z:8};
  return t[c.toUpperCase()]||0;
}

function calcAll(fname, lname, bdate) {
  var parts = bdate.split('-');
  var year = parseInt(parts[0]), month = parseInt(parts[1]), day = parseInt(parts[2]);
  var dateStr = String(day).padStart(2,'0') + String(month).padStart(2,'0') + String(year);
  var lz = reduce(dateStr.split('').reduce(function(a,b){return a+parseInt(b);},0), true);

  var full = (fname+lname).replace(/\s/g,'');
  var vowels = ['A','E','I','O','U','Ä','Ö','Ü'];
  var allVals=[],vowelVals=[],consVals=[];
  full.split('').forEach(function(c){
    var v = charVal(c);
    if(v>0){ allVals.push(v); if(vowels.indexOf(c.toUpperCase())>-1) vowelVals.push(v); else consVals.push(v); }
  });

  var ausdr = reduce(allVals.reduce(function(a,b){return a+b;},0), true);
  var seele = reduce(vowelVals.reduce(function(a,b){return a+b;},0), true);
  var person = reduce(consVals.reduce(function(a,b){return a+b;},0), true);

  var curYear = new Date().getFullYear();
  var age = curYear - year;
  var cycleNum = Math.floor(age/13)+1;
  var cycleStart = year+((cycleNum-1)*13);
  var cycleEnd = cycleStart+12;
  var yearsLeft = cycleEnd-curYear+1;
  var yearInCycle = age-((cycleNum-1)*13)+1;
  var pct = Math.round((yearInCycle/13)*100);

  var pj = reduce(day+month+curYear, false);

  return {lz:lz,ausdr:ausdr,seele:seele,person:person,cycleNum:cycleNum,cycleStart:cycleStart,cycleEnd:cycleEnd,yearsLeft:yearsLeft,yearInCycle:yearInCycle,pct:pct,pj:pj,curYear:curYear};
}

document.getElementById('soulForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '✦ Analysiere...';

  var fname = document.getElementById('fname').value.trim();
  var lname = document.getElementById('lname').value.trim();
  var bdate = document.getElementById('bdate').value;
  var email = document.getElementById('email').value.trim();
  var birthplace = document.getElementById('birthplace').value.trim();
  var marketing = document.getElementById('marketing').checked;

  var d = calcAll(fname, lname, bdate);
  var lzData = LZ_DATA[d.lz] || LZ_DATA[1];
  var bFormatted = bdate.split('-').reverse().join('.');

  var masterBadge = lzData.master ? '<span class="master-badge">MEISTERZAHL</span>' : '';

  var lockedSections = '';
  var paywallSection = '';

  if (!isTest) {
    lockedSections =
      '<div class="locked"><div class="locked-title">🔒 Seelenplan & Lebensaufgabe</div><p>Warum du wirklich hier bist — deine tiefste Aufgabe in diesem Leben.</p></div>' +
      '<div class="locked"><div class="locked-title">🔒 Vorsichtsphasen & Hochphasen</div><p>Wann genau in den nächsten Jahren deine Energie kippt — und wann deine stärksten Momente kommen.</p></div>' +
      '<div class="locked"><div class="locked-title">🔒 Deine persönliche kosmische Botschaft</div><p>Eine direkte Botschaft an dich — basierend auf allen deinen Zahlen kombiniert.</p></div>';

    paywallSection =
      '<div class="paywall">' +
      '<h2>Dein vollständiges Seelenprofil</h2>' +
      '<p>Alle 12 Dimensionen · Vorsichtsphasen · Seelenplan · Persönliche Botschaft · Als PDF per E-Mail</p>' +
      '<div class="price">37 €</div>' +
      '<a href="https://www.digistore24.com/product/PLACEHOLDER" class="btn-pay" target="_blank">✦ Vollständiges Profil erhalten</a>' +
      '<p style="font-size:.7rem;color:var(--muted);margin-top:12px">Sichere Zahlung via Digistore24 · DSGVO-konform · Sofortzustellung</p>' +
      '</div>';
  }

  var zyklus_text = d.yearsLeft <= 3
    ? '<strong>Diese Phase geht zu Ende.</strong> Was du jetzt nicht abschließt, nimmst du als offene Rechnung in den nächsten Zyklus mit.'
    : 'Was du jetzt aufbaust, trägt dich durch den nächsten Abschnitt.';

  document.getElementById('result').innerHTML =
    '<div class="result-header">' +
    '<p class="result-name">✦ ' + fname + ' ' + lname + ' ✦</p>' +
    '<p class="result-date">' + bFormatted + ' · ' + birthplace + '</p>' +
    '<div class="lz-badge">' + d.lz + masterBadge + '</div>' +
    '<p class="lz-name">' + lzData.name + '</p>' +
    '</div>' +

    '<div class="section"><div class="section-title">✦ Deine Lebenszahl ' + d.lz + ' — Wer du wirklich bist</div>' +
    '<p>' + lzData.teaser + '</p></div>' +

    '<div class="section"><div class="section-title">◎ Dein Herzwunsch (Seelenzahl ' + d.seele + ')</div>' +
    '<p>Tief in dir steckt eine Sehnsucht die nicht immer zur Außenwelt passt.<br>' +
    '<strong>Deine Seelenzahl ' + d.seele + ' zeigt was du wirklich willst</strong> — nicht was du dir erlaubst zu wollen.<br><br>' +
    'Das ist oft das Schwierigste: nicht das Ziel zu finden — sondern sich zu erlauben, es zu wollen.<br><br>' +
    '<em>Was genau dein Herz antreibt — und warum du es so oft unterdrückst — steht im vollständigen Profil.</em></p></div>' +

    '<div class="section"><div class="section-title">◐ Wie du wirklich wirkst (Ausdruckszahl ' + d.ausdr + ')</div>' +
    '<p>Was du nach außen trägst und was du innen bist — das stimmt nicht immer überein.<br>' +
    'Deine Ausdruckszahl ' + d.ausdr + ' zeigt den Spalt zwischen dem was die Welt sieht — und dem was du bist.<br><br>' +
    'Dieser Spalt ist größer als du denkst. Und er kostet dich täglich Energie — Energie die du für das benutzen könntest, was du wirklich willst.<br><br>' +
    '<em>Wie du diesen Spalt schließt — steht im vollständigen Profil.</em></p></div>' +

    '<div class="section"><div class="section-title">✧ Gesundheit & Körper</div>' +
    '<p>Dein Körper lügt nicht — er zeigt was die Seele noch nicht aussprechen konnte.<br><br>' +
    'Menschen mit deiner Lebenszahl tragen eine spezifische körperliche Schwachstelle — und sie ist kein Zufall.<br><br>' +
    'Dein Körper lügt nicht. Er zeigt dir seit Jahren was die Seele noch nicht aussprechen konnte.<br><br>' +
    '<em>Was genau dein Körper dir sagen will — und wie du ihn endlich hörst — steht im vollständigen Profil.</em></p></div>' +

    '<div class="section"><div class="section-title">◎ Liebe & Beziehungen</div>' +
    '<p>In der Liebe wiederholt sich ein Muster.<br>' +
    'Nicht weil du Pech hast — sondern weil eine unbewusste Kraft dich immer wieder in dieselbe Konstellation zieht.<br><br>' +
    'Dieses Muster hat einen Namen. Und wenn du ihn kennst, verliert es seine Macht über dich.<br><br>' +
    '<em>Wie dieses Muster heißt und wie du es ein für alle Mal auflöst — steht im vollständigen Profil.</em></p></div>' +

    '<div class="section"><div class="section-title">⊕ Erfolg & Finanzen</div>' +
    '<p>Geld ist Energie. Und Energie folgt Überzeugungen.<br>' +
    'Deine Lebenszahl ' + d.lz + ' trägt eine spezifische Beziehung zu Geld — und eine unsichtbare Blockade, die immer dann aktiv wird, wenn es wirklich vorwärts geht.<br><br>' +
    'Das ist keine Schwäche. Es ist ein Muster — und Muster können geändert werden.<br><br>' +
    '<em>Was dich wirklich aufhält — und wie du es endlich auflöst — steht im vollständigen Profil.</em></p></div>' +

    '<div class="section"><div class="section-title">◐ Dein Lebensabschnitt (' + d.cycleNum + '. Zyklus, 13-Jahres-Phase)</div>' +
    '<p>Du bist seit <strong>' + d.cycleStart + '</strong> in der <strong>' + (ZYKLEN[d.cycleNum]||'Phase der Meisterschaft') + '</strong>.<br><br>' +
    'Das ist Jahr <strong>' + d.yearInCycle + ' von 13</strong> in diesem Abschnitt.' +
    '<div class="zyklus-bar"><div class="zyklus-fill" style="width:' + d.pct + '%"></div></div>' +
    'Du hast noch <strong>' + d.yearsLeft + ' Jahr' + (d.yearsLeft===1?'':'e') + '</strong> in dieser Phase.<br><br>' +
    zyklus_text + '<br><br>' +
    'Ab <strong>' + (d.cycleEnd+1) + '</strong> beginnt für dich die <strong>' + (NEXT_ZYKLEN[d.cycleNum]||'nächste Phase') + '</strong>.' +
    '</p></div>' +

    lockedSections +
    paywallSection;

  document.getElementById('soulForm').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  document.getElementById('result').scrollIntoView({behavior:'smooth'});
  btn.disabled = false; btn.textContent = '✦ Mein Seelenprofil enthüllen';
});
</script>
</body>
</html>
