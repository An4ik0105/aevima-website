<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dein Seelenprofil – AEVIMA</title>
  <link rel="preconnect" href="https://fonts.bunny.net"/>
  <link href="https://fonts.bunny.net/css?family=cinzel:400,600,700|raleway:300,400,500,600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--dark:#12101A;--dark2:#1A1625;--rose:#C4956A;--rose-l:#E8C4A0;--rose-d:#9B6F4A;--teal:#2AAFA0;--teal-d:#1D7A70;--text:#F0EDE8;--muted:#9B8FA8;--border:rgba(196,149,106,.18)}
    body{background:var(--dark);color:var(--text);font-family:'Raleway',sans-serif;font-weight:300;line-height:1.8;min-height:100vh}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(196,149,106,.07) 0,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(42,175,160,.05) 0,transparent 60%);pointer-events:none;z-index:0}
    .wrap{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:60px 24px 80px}
    .back{display:inline-block;color:var(--rose);text-decoration:none;font-size:.8rem;letter-spacing:.1em;margin-bottom:40px;opacity:.8}
    .back:hover{opacity:1}
    h1{font-family:'Cinzel',serif;font-size:clamp(1.8rem,5vw,2.6rem);font-weight:700;color:var(--rose-l);letter-spacing:.1em;margin-bottom:10px}
    .subtitle{color:var(--muted);font-size:.9rem;margin-bottom:48px;letter-spacing:.05em}
    .divider{width:60px;height:1px;background:linear-gradient(to right,transparent,var(--rose),transparent);margin:0 auto 48px}

    /* FORM */
    .form-group{margin-bottom:24px}
    label{display:block;font-size:.8rem;letter-spacing:.12em;color:var(--rose);text-transform:uppercase;margin-bottom:8px}
    input[type=text],input[type=date]{width:100%;padding:14px 18px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:2px;color:var(--text);font-family:'Raleway',sans-serif;font-size:.95rem;outline:none;transition:border-color .3s}
    input:focus{border-color:rgba(196,149,106,.5)}
    input::placeholder{color:var(--muted);opacity:.7}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--rose),var(--rose-d));color:var(--dark);border:none;border-radius:2px;font-family:'Cinzel',serif;font-size:.85rem;font-weight:700;letter-spacing:.2em;cursor:pointer;transition:all .3s;margin-top:8px}
    .btn:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(196,149,106,.3)}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

    /* RESULT */
    #result{display:none;margin-top:48px}
    .result-header{text-align:center;margin-bottom:44px}
    .result-name{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--rose-l);letter-spacing:.2em;margin-bottom:24px}
    .lz-number{font-family:'Cinzel',serif;font-size:4.5rem;font-weight:700;color:var(--rose);line-height:1;margin-bottom:6px}
    .lz-label{font-size:.72rem;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
    .master-badge{display:inline-block;font-size:.6rem;letter-spacing:.18em;color:var(--teal);border:1px solid rgba(42,175,160,.4);padding:.2rem .7rem;border-radius:20px;margin-top:6px}

    /* SECTIONS */
    .section{border:1px solid var(--border);border-radius:3px;padding:28px 30px;margin-bottom:16px;background:rgba(196,149,106,.03)}
    .section-label{font-family:\'Cinzel\',serif;font-size:.65rem;letter-spacing:.22em;color:var(--rose);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
    .section-label::after{content:'';flex:1;height:1px;background:rgba(196,149,106,.15)}
    .section-text{color:rgba(240,237,232,.8);font-size:.9rem;line-height:1.95}

    /* WIEDERERKENNUNG */
    .wiedererkennung-block{border-left:2px solid rgba(196,149,106,.35);padding:20px 24px;margin-bottom:16px;background:rgba(196,149,106,.04);border-radius:0 3px 3px 0}
    .wiedererkennung-block p{color:var(--rose-l);font-size:.92rem;font-style:italic;line-height:1.9}

    /* AEVIMA MOMENT */
    .aevima-moment{text-align:center;padding:40px 30px;margin-bottom:16px;background:rgba(42,175,160,.04);border:1px solid rgba(42,175,160,.15);border-radius:3px}
    .aevima-moment-lines{color:var(--text);font-size:.95rem;line-height:2.1}
    .aevima-moment-lines .moment-question{display:block;font-family:'Cinzel',serif;color:var(--rose-l);font-size:1.05rem;margin-top:10px;letter-spacing:.04em}

    /* PREMIUM */
    .premium-uebergang{color:var(--muted);font-size:.85rem;font-style:italic;text-align:center;margin-bottom:32px;padding:0 20px}
    .paywall{text-align:center;padding:44px 28px;background:linear-gradient(135deg,rgba(196,149,106,.07),rgba(42,175,160,.05));border:1px solid var(--border);border-radius:3px;margin-top:8px}
    .paywall-list{text-align:left;max-width:320px;margin:0 auto 28px;list-style:none;padding:0}
    .paywall-list li{color:var(--muted);font-size:.85rem;padding:5px 0;padding-left:18px;position:relative}
    .paywall-list li::before{content:'✦';position:absolute;left:0;color:var(--rose);font-size:.6rem;top:8px}
    .price{font-family:'Cinzel',serif;font-size:2.2rem;color:var(--rose);margin:20px 0 8px}
    .price-sub{color:var(--muted);font-size:.75rem;letter-spacing:.08em;margin-bottom:28px}
    .btn-pay{display:inline-block;padding:17px 52px;background:linear-gradient(135deg,var(--rose),var(--rose-d));color:var(--dark);border:none;border-radius:2px;font-family:'Cinzel',serif;font-size:.85rem;font-weight:700;letter-spacing:.2em;cursor:pointer;text-decoration:none;transition:all .3s}
    .btn-pay:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(196,149,106,.35)}
    .paywall-note{font-size:.72rem;color:var(--muted);margin-top:14px;opacity:.7}

    /* ERROR */
    .error-msg{color:#E07070;font-size:.85rem;text-align:center;padding:16px;background:rgba(200,80,80,.08);border-radius:3px;margin-top:12px;display:none}

    @media(max-width:500px){.form-row{grid-template-columns:1fr}.lz-number{font-size:3.5rem}}
  </style>
</head>
<body>
<div class="wrap">
  <a href="index.html" class="back">← AEVIMA</a>

  <div style="text-align:center">
    <h1>DEIN SEELENPROFIL</h1>
    <p class="subtitle">Persönliche Analyse auf Basis deiner Lebenszahl</p>
  </div>
  <div class="divider"></div>

  <form id="soulForm">
    <div class="form-row">
      <div class="form-group">
        <label>Vorname</label>
        <input type="text" id="fname" placeholder="z.B. Anna" required autocomplete="given-name"/>
      </div>
      <div class="form-group">
        <label>Nachname</label>
        <input type="text" id="lname" placeholder="z.B. Muster" required autocomplete="family-name"/>
      </div>
    </div>
    <div class="form-group">
      <label>Geburtsdatum</label>
      <input type="text" id="bdate" placeholder="TT.MM.JJJJ" maxlength="10" inputmode="numeric" required autocomplete="bday"/>
      <p style="color:var(--muted);font-size:.72rem;margin-top:6px;letter-spacing:.04em">Beispiel: 01.05.1989</p>
    </div>
    <button type="submit" class="btn" id="submitBtn">✦ Meine Analyse starten</button>
    <div class="error-msg" id="errorMsg">Etwas ist schiefgelaufen. Bitte versuche es erneut.</div>
  </form>

  <div id="result"></div>
</div>

<script>
// ─────────────────────────────────────────
// BERECHNUNGSLOGIK (lokal, kein API)
// ─────────────────────────────────────────
var MASTER_NUMBERS = [11, 22, 33];

function reduceNum(sum) {
  if (MASTER_NUMBERS.indexOf(sum) > -1) return sum;
  while (sum > 9) {
    if (MASTER_NUMBERS.indexOf(sum) > -1) return sum;
    var next = 0;
    String(sum).split('').forEach(function(d){ next += parseInt(d) || 0; });
    sum = next;
  }
  return sum;
}

function parseDate(raw) {
  raw = (raw || '').trim();
  if (raw.indexOf('.') > -1) {
    var p = raw.split('.');
    return (p.length === 3 && p[2].length === 4) ? { day: p[0], month: p[1], year: p[2] } : null;
  }
  if (raw.indexOf('-') > -1) {
    var q = raw.split('-');
    return (q.length === 3) ? { day: q[2], month: q[1], year: q[0] } : null;
  }
  return null;
}

function calcLebenszahl(raw) {
  var d = parseDate(raw);
  if (!d) return null;
  var flat = d.day + d.month + d.year;
  return reduceNum(flat.split('').reduce(function(a, b){ return a + (parseInt(b) || 0); }, 0));
}

var CHAR_VAL = {A:1,B:2,C:3,D:4,E:5,F:6,G:7,H:8,I:9,J:1,K:2,L:3,M:4,N:5,O:6,P:7,Q:8,R:9,S:1,T:2,U:3,V:4,W:5,X:6,Y:7,Z:8,Ä:1,Ö:6,Ü:3};
var VOWELS = {A:1,E:1,I:1,O:1,U:1,Ä:1,Ö:1,Ü:1};

function calcHerzwunsch(fname, lname) {
  var full = (fname + lname).toUpperCase().replace(/[^A-ZÄÖÜ]/g, '');
  var sum = 0;
  for (var i = 0; i < full.length; i++) {
    var c = full[i];
    if (VOWELS[c] && CHAR_VAL[c]) sum += CHAR_VAL[c];
  }
  return reduceNum(sum);
}

function calcAusdruckszahl(fname, lname) {
  var full = (fname + lname).toUpperCase().replace(/[^A-ZÄÖÜ]/g, '');
  var sum = 0;
  for (var i = 0; i < full.length; i++) {
    if (CHAR_VAL[full[i]]) sum += CHAR_VAL[full[i]];
  }
  return reduceNum(sum);
}

// Lebensabschnitt
var PHASEN = {1:'Phase des Neubeginns',2:'Phase der Verbindung',3:'Phase des Wachstums',4:'Phase des Aufbaus',5:'Phase der Veränderung',6:'Phase der Verantwortung',7:'Phase der Besinnung',8:'Phase der Manifestation',9:'Phase des Abschlusses'};
function calcLebensabschnitt(bdate) {
  var d = parseDate(bdate);
  if (!d) return null;
  var cy = new Date().getFullYear();
  var daySum = reduceNum(parseInt(d.day[0]||0)*10+parseInt(d.day[1]||0));
  var monSum = reduceNum(parseInt(d.month[0]||0)*10+parseInt(d.month[1]||0));
  var yrSum  = reduceNum(String(cy).split('').reduce(function(a,b){return a+(parseInt(b)||0);},0));
  var py = reduceNum(daySum + monSum + yrSum);
  if (py > 9) py = py % 9 || 9;
  var startYear = cy - py + 1;
  return { phase: PHASEN[py] || 'Phase der Besinnung', since: startYear };
}

// ─────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────
function moment(data) {
  var lines = data.aevima_moment.split('\n');
  var q = lines.pop();
  var intro = lines.join('<br>');
  return '<div class="aevima-moment"><div class="aevima-moment-lines">' + intro + '<span class="moment-question">' + q + '</span></div></div>';
}

function renderLZ(data) {
  var h = '';
  h += '<div class="section"><div class="section-label">✦ Kernthema</div><p class="section-text">' + data.kernthema + '</p></div>';
  h += '<div class="section"><div class="section-label">✦ Stärke</div><p class="section-text">' + data.staerke + '</p></div>';
  h += '<div class="section"><div class="section-label">✦ Herausforderung</div><p class="section-text">' + data.herausforderung + '</p></div>';
  h += moment(data);
  return h;
}

function renderHWZ(data) {
  var h = '';
  h += '<div class="section"><div class="section-label">✦ Kernthema</div><p class="section-text">' + data.kernthema + '</p></div>';
  h += '<div class="section"><div class="section-label">✦ Herausforderung</div><p class="section-text">' + data.herausforderung + '</p></div>';
  h += moment(data);
  return h;
}

function renderAZ(data) {
  var h = '';
  h += '<div class="section"><div class="section-label">✦ Kernthema</div><p class="section-text">' + data.kernthema + '</p></div>';
  h += '<div class="section"><div class="section-label">✦ Herausforderung</div><p class="section-text">' + data.herausforderung + '</p></div>';
  h += moment(data);
  return h;
}

function numHeader(label, num, isMaster, sublabel) {
  var h = '<div style="text-align:center;margin-bottom:32px">';
  h += '<p class="lz-label">' + label + '</p>';
  h += '<div class="lz-number">' + num + '</div>';
  h += '<p style="color:var(--muted);font-size:.72rem;letter-spacing:.14em;margin-top:6px">' + sublabel + (isMaster ? ' · MEISTERZAHL' : '') + '</p>';
  if (isMaster) h += '<div class="master-badge">✦ MEISTERZAHL ✦</div>';
  h += '</div>';
  return h;
}

function divider() {
  return '<div style="width:60px;height:1px;background:linear-gradient(to right,transparent,var(--rose),transparent);margin:44px auto"></div>';
}

function renderResult(fname, lname, lz, hwz, az, lzData, hwzData, azData, bdate) {
  var h = '';
  h += '<div class="result-header"><p class="result-name">✦ ' + fname + ' ' + lname.charAt(0) + '. ✦</p></div>';

  h += numHeader('So wirke ich', lz, MASTER_NUMBERS.indexOf(lz) > -1, 'LEBENSZAHL');
  if (lzData.einordnung) h += '<p style="color:var(--muted);font-size:.85rem;line-height:1.85;text-align:center;padding:0 8px;margin-bottom:28px;font-style:italic">' + lzData.einordnung + '</p>';
  h += renderLZ(lzData);
  h += divider();

  h += numHeader('Was ich wirklich will', hwz, MASTER_NUMBERS.indexOf(hwz) > -1, 'HERZWUNSCHZAHL');
  h += renderHWZ(hwzData);
  h += divider();

  h += numHeader('Wie andere mich erleben', az, MASTER_NUMBERS.indexOf(az) > -1, 'AUSDRUCKSZAHL');
  h += renderAZ(azData);

  // Lebensabschnitt
  var la = calcLebensabschnitt(bdate || '');
  if (la) {
    h += '<div style="text-align:center;padding:28px 0 8px">';
    h += '<p style="font-family:\'Cinzel\',serif;font-size:.65rem;letter-spacing:.2em;color:var(--muted);margin-bottom:10px">LEBENSABSCHNITT</p>';
    h += '<p style="color:var(--text);font-size:.92rem;line-height:1.8">Du befindest dich seit <strong>' + la.since + '</strong> in der <strong>' + la.phase + '</strong>.</p>';
    h += '</div>';
    h += divider();
  }

  h += '<div class="paywall" style="margin-top:40px">';
  h += '<p style="font-family:\'Cinzel\',serif;font-size:.7rem;letter-spacing:.18em;color:var(--muted);margin-bottom:16px">✦ VOLLSTÄNDIGE ANALYSE ✦</p>';
  h += '<p style="color:var(--muted);font-size:.85rem;max-width:360px;margin:0 auto 20px;line-height:1.7">Die Zahlen zeigen einzelne Facetten. Die vollständige Analyse zeigt, wo sie zusammenwirken.</p>';
  h += '<ul class="paywall-list">';
  h += '<li>Geldmuster &amp; finanzielle Überzeugungen</li>';
  h += '<li>Beziehungsmuster &amp; wiederkehrende Dynamiken</li>';
  h += '<li>Wiederkehrende Lebensthemen</li>';
  h += '<li>Innere Spannungsfelder</li>';
  h += '<li>Persönliche Synthese aller Zahlen</li>';
  h += '<li>Persönlicher Lebenskompass</li>';
  h += '</ul>';
  h += '<div class="price">39 €</div>';
  h += '<p class="price-sub">Einmalig · Kein Abo · Sofortiger Zugang</p>';
  h += '<a href="checkout.html" class="btn-pay">✦ Mein Profil freischalten</a>';
  h += '<p class="paywall-note">Sichere Zahlung · Sofortzustellung · DSGVO-konform</p>';
  h += '</div>';

  return h;
}

// ─────────────────────────────────────────
// FORM SUBMIT
// ─────────────────────────────────────────
// Auto-Restore nach checkout → confirmation → zurück
(function() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('showResult') === '1') {
    var fn = localStorage.getItem('aevima_fname');
    var ln = localStorage.getItem('aevima_lname');
    var bd = localStorage.getItem('aevima_bdate');
    if (fn && ln && bd) {
      var lz = calcLebenszahl(bd);
      var hwz = calcHerzwunsch(fn, ln);
      var az  = calcAusdruckszahl(fn, ln);
      if (lz) {
        Promise.all([
          fetch('public/data/preview_lebenszahl.json').then(function(r){ return r.json(); }),
          fetch('public/data/preview_herzwunsch.json').then(function(r){ return r.json(); }),
          fetch('public/data/preview_ausdruckszahl.json').then(function(r){ return r.json(); })
        ]).then(function(res) {
          var lzD = res[0][String(lz)], hwzD = res[1][String(hwz)], azD = res[2][String(az)];
          if (lzD && hwzD && azD) {
            document.getElementById('result').innerHTML = renderResult(fn, ln, lz, hwz, az, lzD, hwzD, azD, bd);
            document.getElementById('soulForm').style.display = 'none';
            document.getElementById('result').style.display = 'block';
          }
        }).catch(function(){});
      }
    }
  }
})();

document.getElementById('soulForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var btn = document.getElementById('submitBtn');
  var errMsg = document.getElementById('errorMsg');
  errMsg.style.display = 'none';
  btn.disabled = true;
  btn.textContent = '✦ Berechne...';

  var fname = document.getElementById('fname').value.trim();
  var lname = document.getElementById('lname').value.trim();
  var bdateRaw = document.getElementById('bdate').value.trim();

  var lz = calcLebenszahl(bdateRaw);
  if (!lz) {
    errMsg.style.display = 'block';
    errMsg.textContent = 'Bitte Geburtsdatum im Format TT.MM.JJJJ eingeben — z.B. 01.05.1989';
    btn.disabled = false;
    btn.textContent = '✦ Meine Analyse starten';
    return;
  }

  var hwz = calcHerzwunsch(fname, lname);
  var az  = calcAusdruckszahl(fname, lname);

  Promise.all([
    fetch('public/data/preview_lebenszahl.json').then(function(r){ return r.json(); }),
    fetch('public/data/preview_herzwunsch.json').then(function(r){ return r.json(); }),
    fetch('public/data/preview_ausdruckszahl.json').then(function(r){ return r.json(); })
  ])
  .then(function(results) {
    var lzData  = results[0][String(lz)];
    var hwzData = results[1][String(hwz)];
    var azData  = results[2][String(az)];
    if (!lzData)  throw new Error('LZ '  + lz  + ' nicht gefunden');
    if (!hwzData) throw new Error('HWZ ' + hwz + ' nicht gefunden');
    if (!azData)  throw new Error('AZ '  + az  + ' nicht gefunden');

    document.getElementById('result').innerHTML = renderResult(fname, lname, lz, hwz, az, lzData, hwzData, azData, bdateRaw);
    document.getElementById('soulForm').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
    // Ergebnis für Post-Checkout-Rückkehr speichern
    localStorage.setItem('aevima_fname', fname);
    localStorage.setItem('aevima_lname', lname);
    localStorage.setItem('aevima_bdate', bdateRaw);
  })
  .catch(function(err) {
    console.error(err);
    errMsg.style.display = 'block';
    errMsg.textContent = 'Fehler beim Laden der Analyse. Bitte Seite neu laden.';
  })
  .finally(function() {
    btn.disabled = false;
    btn.textContent = '✦ Meine Analyse starten';
  });
});
</script>
</body>
</html>
