<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dein Seelenprofil — AEVIMA</title>
  <link rel="preconnect" href="https://fonts.bunny.net"/>
  <link href="https://fonts.bunny.net/css?family=cinzel:400,600,700|raleway:300,400,500,600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --black:#0F0E14;--night:#18161F;--off-white:#EDE9E2;--text:#D8D4CC;--muted:#9B8FA8;
      --emerald:#1E7A52;--teal:#2AAFA0;
      --rose:#C4956A;--rose-l:#E8C4A0;
      --br:rgba(196,149,106,.22);--bt:rgba(42,175,160,.28);--be:rgba(30,122,82,.3);
    }
    html{scroll-behavior:smooth}
    body{
      background:var(--black);color:var(--text);
      font-family:'Raleway',sans-serif;font-weight:300;line-height:1.85;
      min-height:100vh;font-size:18px
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:
        radial-gradient(ellipse at 30% 10%,rgba(30,122,82,.05) 0,transparent 55%),
        radial-gradient(ellipse at 70% 90%,rgba(42,175,160,.04) 0,transparent 55%);
      pointer-events:none;z-index:0
    }
    .page{position:relative;z-index:1;max-width:660px;margin:0 auto;padding:0 20px 100px}

    /* ── LOGO ── */
    .logo-wrap{display:flex;justify-content:center;padding:48px 0 32px}
    .logo-wrap img{max-width:210px;height:auto;filter:drop-shadow(0 0 20px rgba(196,149,106,.25))}

    /* ── INTRO ── */
    .intro{text-align:center;padding:0 0 40px}
    .headline{
      font-family:'Cinzel',serif;font-size:clamp(1.4rem,5vw,1.9rem);
      font-weight:600;color:var(--rose-l);letter-spacing:.06em;line-height:1.35;margin-bottom:10px
    }
    .subline{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;margin-bottom:28px}
    .divider{width:56px;height:1px;background:linear-gradient(to right,transparent,var(--rose),transparent);margin:0 auto 28px}
    .intro-body{color:var(--muted);font-size:1rem;line-height:1.7}

    /* ── FORM ── */
    .form-group{margin-bottom:18px}
    label{display:block;font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.18em;color:var(--rose);text-transform:uppercase;margin-bottom:7px}
    .field{
      width:100%;padding:14px 16px;background:rgba(255,255,255,.04);
      border:1px solid var(--br);border-radius:2px;color:var(--off-white);
      font-family:'Raleway',sans-serif;font-size:1rem;outline:none;
      transition:border-color .25s,background .25s
    }
    .field:focus{border-color:rgba(42,175,160,.6);background:rgba(42,175,160,.03)}
    .field::placeholder{color:var(--muted);opacity:.55}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .check-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px}
    .check-row input{width:17px;height:17px;min-width:17px;margin-top:4px;accent-color:var(--teal)}
    .check-row span{font-size:.875rem;color:var(--muted);line-height:1.6}
    .check-row a{color:var(--rose);text-decoration:none}
    .btn-start{
      width:100%;padding:18px 24px;
      background:linear-gradient(135deg,var(--emerald),#16704A);
      color:var(--off-white);border:none;border-radius:2px;
      font-family:'Cinzel',serif;font-size:.82rem;font-weight:700;letter-spacing:.22em;
      cursor:pointer;transition:all .25s;margin-top:10px;min-height:56px;
      display:flex;align-items:center;justify-content:center;gap:8px
    }
    .btn-start:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 32px rgba(30,122,82,.4)}
    .btn-start:disabled{opacity:.45;cursor:not-allowed}
    .btn-note{color:var(--muted);font-size:.82rem;text-align:center;margin-top:10px}

    /* ── RESULT ── */
    #result{display:none;margin-top:8px}
    .r-logo{display:flex;justify-content:center;padding:40px 0 28px}
    .r-logo img{max-width:150px;height:auto;filter:drop-shadow(0 0 16px rgba(196,149,106,.2))}
    .r-hero{text-align:center;margin-bottom:36px}
    .r-name{font-family:'Cinzel',serif;font-size:1.05rem;color:var(--rose-l);letter-spacing:.15em;margin-bottom:4px}
    .r-date{color:var(--muted);font-size:.82rem;letter-spacing:.05em;margin-bottom:20px}
    .lz-num{font-family:'Cinzel',serif;font-size:4.2rem;font-weight:700;color:var(--rose);line-height:1;display:block}
    .lz-name{font-family:'Cinzel',serif;font-size:.95rem;color:var(--rose-l);letter-spacing:.12em;margin-top:8px;display:block}
    .master-tag{display:inline-block;font-size:.6rem;letter-spacing:.18em;color:var(--teal);border:1px solid rgba(42,175,160,.4);padding:.2rem .6rem;border-radius:20px;margin-left:8px;vertical-align:middle}

    /* ── PILLARS ── */
    .pillar{
      border-radius:4px;padding:32px;margin-bottom:20px;
      border:1px solid var(--br);
      box-shadow:0 6px 40px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.04)
    }
    .pillar.p-strong{padding:36px 32px;margin-bottom:24px}
    .pillar.p-quiet{padding:24px 28px;margin-bottom:14px}
    .pt{
      font-family:'Cinzel',serif;font-size:.67rem;letter-spacing:.22em;
      color:var(--rose);text-transform:uppercase;margin-bottom:6px;
      display:flex;align-items:center;gap:8px
    }
    .p-sublabel{
      font-size:.7rem;letter-spacing:.12em;color:var(--muted);
      text-transform:uppercase;font-family:'Raleway',sans-serif;font-weight:400;
      margin-bottom:18px;padding-bottom:14px;
      border-bottom:1px solid rgba(196,149,106,.12)
    }
    .p-teal{
      border-color:var(--bt);background:rgba(42,175,160,.03);
      box-shadow:0 6px 40px rgba(0,0,0,.35),0 0 50px rgba(42,175,160,.05),inset 0 1px 0 rgba(42,175,160,.07)
    }
    .p-teal .pt{color:var(--teal)}
    .p-em{border-color:var(--be);background:rgba(30,122,82,.025)}
    .p-em .pt{color:#3DB87A}
    .pillar p{font-size:1rem;color:var(--text);line-height:1.85}
    .pillar p strong{color:var(--off-white)}
    .pillar p em{color:var(--rose-l);font-style:italic}
    .fade-line{
      color:var(--muted);font-style:italic;font-size:.9rem;
      margin-top:16px;padding-top:14px;
      border-top:1px solid rgba(196,149,106,.12);
      letter-spacing:.03em;line-height:1.7
    }

    /* ── BADGE ── */
    .hot-badge{
      display:inline-flex;align-items:center;font-family:'Cinzel',serif;
      font-size:.52rem;letter-spacing:.12em;padding:.2rem .55rem;border-radius:20px;
      margin-left:8px;background:rgba(42,175,160,.12);color:var(--teal);
      border:1px solid rgba(42,175,160,.25)
    }

    /* ── PAYWALL ── */
    .pw-box{
      background:linear-gradient(160deg,rgba(22,20,30,1) 0%,rgba(18,16,24,1) 100%);
      border:1px solid rgba(42,175,160,.4);border-radius:6px;
      padding:44px 32px;text-align:center;margin:36px 0 28px;
      box-shadow:0 12px 60px rgba(0,0,0,.6),0 0 80px rgba(42,175,160,.08),inset 0 1px 0 rgba(42,175,160,.12)
    }
    .pw-logo{display:flex;justify-content:center;margin-bottom:28px}
    .pw-logo img{max-width:90px;height:auto;opacity:.95;filter:drop-shadow(0 0 12px rgba(196,149,106,.3))}
    .pw-headline{
      font-family:'Cinzel',serif;font-size:1.15rem;color:var(--rose-l);
      line-height:1.55;letter-spacing:.04em;margin-bottom:16px;font-weight:600
    }
    .pw-sub{color:var(--muted);font-size:.95rem;line-height:1.8;margin-bottom:28px;font-style:italic}
    .pw-divider{width:48px;height:1px;background:linear-gradient(to right,transparent,var(--teal),transparent);margin:0 auto 28px}
    .pw-pilot-label{
      font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.22em;
      color:var(--teal);text-transform:uppercase;margin-bottom:6px
    }
    .pw-price{font-family:'Cinzel',serif;font-size:2.8rem;color:var(--rose);line-height:1;margin-bottom:6px;font-weight:700}
    .pw-price-note{color:var(--muted);font-size:.82rem;margin-bottom:28px}
    .pw-items{margin-bottom:32px;text-align:left}
    .pw-item{display:flex;align-items:flex-start;gap:12px;color:var(--text);font-size:.95rem;padding:7px 0;line-height:1.55}
    .pw-check{color:var(--teal);font-size:.8rem;margin-top:3px;flex-shrink:0}
    .btn-pw{
      display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
      padding:19px;background:linear-gradient(135deg,var(--emerald),#16704A);
      color:var(--off-white);border:none;border-radius:3px;
      font-family:'Cinzel',serif;font-size:.82rem;font-weight:700;letter-spacing:.22em;
      cursor:pointer;transition:all .25s;min-height:58px;text-decoration:none;
      box-shadow:0 4px 28px rgba(30,122,82,.4)
    }
    .btn-pw:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(30,122,82,.55)}
    .pw-trust{color:var(--muted);font-size:.78rem;margin-top:14px}

    /* ── LOCKED CARDS ── */
    .locked-wrap{position:relative;overflow:hidden;border-radius:4px;margin-bottom:20px}
    .locked-card{
      border:1px solid rgba(196,149,106,.14);border-radius:4px;
      padding:32px;background:rgba(15,14,20,.55)
    }
    .locked-card.p-quiet-card{opacity:.75;padding:24px 28px}
    .locked-teaser{position:relative;margin-top:14px;min-height:90px}
    .locked-teaser-text{
      color:var(--text);font-size:1rem;line-height:1.85;
      filter:blur(5px);user-select:none;pointer-events:none;
      -webkit-mask-image:linear-gradient(to bottom,rgba(0,0,0,.9) 0%,rgba(0,0,0,.4) 60%,transparent 100%);
      mask-image:linear-gradient(to bottom,rgba(0,0,0,.9) 0%,rgba(0,0,0,.4) 60%,transparent 100%)
    }
    .locked-over{
      position:absolute;bottom:0;left:0;right:0;
      display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
      padding:16px;
      background:linear-gradient(to top,rgba(15,14,20,.98) 35%,transparent 100%)
    }
    .locked-icon{font-size:1.2rem;color:var(--rose);margin-bottom:8px;opacity:.75}
    .locked-hint{
      font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.1em;
      color:var(--muted);text-align:center;font-style:italic
    }

    /* ── CYCLE ── */
    .cyc-bar{background:rgba(255,255,255,.07);border-radius:20px;height:7px;margin:10px 0;overflow:hidden}
    .cyc-fill{height:100%;background:linear-gradient(to right,var(--teal),var(--rose));border-radius:20px}

    /* ── ORNAMENTS ── */
    .orn{width:80px;height:1px;background:linear-gradient(to right,transparent,var(--rose),transparent);margin:40px auto}
    .orn-t{width:80px;height:1px;background:linear-gradient(to right,transparent,var(--teal),transparent);margin:40px auto}

    /* ── CLOSING ── */
    .closing{text-align:center;padding:48px 0 60px}
    .closing img{max-width:80px;margin-bottom:16px;opacity:.85;filter:drop-shadow(0 0 10px rgba(196,149,106,.2))}
    .cl-label{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;margin-bottom:18px}
    .cl-quote{font-size:1rem;color:var(--off-white);line-height:1.9;font-style:italic}

    @media(max-width:500px){
      .row2{grid-template-columns:1fr}
      .pillar,.pillar.p-strong{padding:24px 18px}
      .pillar.p-quiet{padding:20px 18px}
      .pw-box{padding:32px 18px}
      .locked-card{padding:24px 18px}
    }
  </style>
</head>
<body>
<div class="page">

  <!-- LOGO -->
  <div class="logo-wrap">
    <img src="logo.png" alt="AEVIMA" loading="eager"/>
  </div>

  <!-- INTRO -->
  <div class="intro">
    <h1 class="headline">Manche Dinge<br>wiederholen sich.<br><span style="color:var(--teal)">Nicht zufällig.</span></h1>
    <div class="divider"></div>
    <p class="subline">Kein Zufall. Dein Weg.</p>
    <p class="intro-body">Name · Geburtsdatum · Geburtsort — das ist alles was du brauchst.</p>
  </div>

  <!-- FORM -->
  <form id="soulForm" novalidate>
    <div class="row2">
      <div class="form-group">
        <label for="fname">Vorname</label>
        <input type="text" id="fname" class="field" placeholder="Anna" required/>
      </div>
      <div class="form-group">
        <label for="lname">Nachname</label>
        <input type="text" id="lname" class="field" placeholder="Muster" required/>
      </div>
    </div>
    <div class="form-group">
      <label for="bdate">Geburtsdatum</label>
      <input type="date" id="bdate" class="field" required/>
    </div>
    <div class="form-group">
      <label for="birthplace">Geburtsort</label>
      <input type="text" id="birthplace" class="field" placeholder="Stadt, Land" required/>
    </div>
    <div class="form-group">
      <label for="email">E-Mail</label>
      <input type="email" id="email" class="field" placeholder="deine@email.de" required/>
    </div>
    <div style="margin:20px 0 4px">
      <div class="check-row">
        <input type="checkbox" id="ds" required/>
        <span>Ich stimme der Verarbeitung meiner Daten gemäß <a href="datenschutz.html">Datenschutzerklärung</a> zu. *</span>
      </div>
      <div class="check-row">
        <input type="checkbox" id="nl"/>
        <span>Ich möchte Einblicke per E-Mail erhalten.</span>
      </div>
    </div>
    <button type="submit" class="btn-start" id="submitBtn">✦ Analyse starten</button>
    <p class="btn-note">Kostenlose Vorschau · Kein Konto nötig</p>
  </form>

  <!-- RESULT -->
  <div id="result"></div>

</div>
<script>
// ── CONFIG ───────────────────────────────────────────────────────
var isTest = location.search.indexOf('test=1') > -1 || localStorage.getItem('aevima-test') === '1';

// ── GENDER-NEUTRAL LIFE NUMBER DATA ─────────────────────────────
var LZ = {
  1:{n:"Die 1 — Wille &amp; Aufbruch",t:"Du bist hier um voranzugehen — nicht um zu folgen. Wenn du in einem Raum bist, spüren andere deine Energie.<br><br><strong>Deine Stärke:</strong> ein unerschütterlicher Wille. Du stehst auf — immer wieder.<br><em>Dein Schatten:</em> Du kämpfst damit, jemanden wirklich brauchen zu dürfen."},
  2:{n:"Die 2 — Verbindung &amp; Tiefe",t:"Du spürst was andere fühlen — noch bevor sie es selbst wissen. Du bist hier um zu verbinden, zu heilen.<br><br><strong>Dein Geschenk:</strong> Du siehst das Gute in jedem Menschen.<br><em>Dein Kampf:</em> Du weißt nicht immer, wo du aufhörst und andere anfangen."},
  3:{n:"Die 3 — Ausdruck &amp; Kreativität",t:"Wenn du redest, hören Menschen zu. Die 3 ist die Lebenszahl der Kreativität und des Ausdrucks.<br><br><strong>Deine Stärke:</strong> Ideen fließen dir zu wie Wasser.<br><em>Dein Schatten:</em> Du verlierst dich leicht. Fängst viel an — beendest wenig."},
  4:{n:"Die 4 — Fundament &amp; Struktur",t:"Du bist derjenige, auf den sich alle verlassen. Struktur, Verlässlichkeit, Fundament.<br><br><strong>Deine Stärke:</strong> Was du dir vornimmst, ziehst du durch.<br><em>Dein Kampf:</em> Du fragst dich selten, ob das Fundament selbst getragen wird."},
  5:{n:"Die 5 — Freiheit &amp; Bewegung",t:"Du wirst in keine Schublade passen. Die 5 ist die Lebenszahl der Freiheit und des Wandels.<br><br><strong>Deine Gabe:</strong> Du siehst Möglichkeiten die andere übersehen.<br><em>Dein Muster:</em> Nähe fühlt sich manchmal wie ein Käfig an."},
  6:{n:"Die 6 — Liebe &amp; Verantwortung",t:"Du liebst tiefer als die meisten. Die 6 steht für Liebe, Familie, Verantwortung.<br><br><strong>Deine Stärke:</strong> Du erschaffst Geborgenheit überall wo du bist.<br><em>Dein Schatten:</em> Du gibst so viel — und fragst dich manchmal ob irgendjemand das sieht."},
  7:{n:"Die 7 — Tiefe &amp; Wahrheit",t:"Du bist hier um Wahrheiten zu finden die andere nicht einmal suchen. Tiefer. Feiner. Weiter.<br><br><strong>Deine Gabe:</strong> Du erkennst Muster die anderen verborgen bleiben.<br><em>Dein Kampf:</em> Du vertraust schwer."},
  8:{n:"Die 8 — Macht &amp; Fülle",t:"Du bist für mehr gemacht als du dir erlaubst zu zeigen. Macht, Wohlstand, Leistung.<br><br><strong>Deine Gabe:</strong> Du kannst Großes aufbauen.<br><em>Dein Muster:</em> Du schwankst zwischen Vollgas und tiefem Zweifel."},
  9:{n:"Die 9 — Weisheit &amp; Vollendung",t:"Du trägst ein Wissen in dir das du dir noch nicht vollständig erklärst. Die höchste einstellige Zahl.<br><br><strong>Deine Gabe:</strong> Mitgefühl, Weitsicht, tiefes Verständnis.<br><em>Dein Kampf:</em> Du gibst für andere — und lässt dich selbst oft zurück."},
  11:{n:"Die 11 — Intuition &amp; Licht",t:"Du bist mit einer Antenne auf die Welt gekommen die andere nicht haben. Meisterzahl der Intuition.<br><br><strong>Deine Gabe:</strong> Du spürst Dinge bevor sie passieren.<br><em>Dein Kampf:</em> Empfindsamkeit ist gleichzeitig Stärke und Schmerz.",m:true},
  22:{n:"Die 22 — Vision &amp; Meisterschaft",t:"Du bist hier um etwas zu erschaffen das Generationen überdauert. Die mächtigste Meisterzahl.<br><br><strong>Deine Gabe:</strong> Du siehst das große Bild und kannst es aufbauen.<br><em>Dein Muster:</em> Das Gewicht deiner Vision erschreckt dich manchmal.",m:true},
  33:{n:"Die 33 — Mitgefühl &amp; Führung",t:"Du bist nicht hier um ein normales Leben zu führen. Die seltenste Meisterzahl.<br><br><strong>Deine Gabe:</strong> Du kannst Menschen tief und nachhaltig berühren.<br><em>Dein Schatten:</em> Du gibst bis zur Erschöpfung.",m:true}
};

var HW={1:"Du willst nicht gebraucht werden. Du willst gebraucht werden dürfen — ohne dafür stark sein zu müssen.",2:"Du willst jemanden, der ohne Aufforderung fragt wie es dir wirklich geht — und dann wartet.",3:"Du willst ernst genommen werden — nicht bewundert. Für das was du bist, wenn du aufhörst zu produzieren.",4:"Du willst einmal sagen dürfen: Ich weiß nicht ob ich das schaffe — ohne sofort die Lösung parat haben zu müssen.",5:"Du willst tief gekannt sein — und trotzdem frei.",6:"Du willst geliebt werden ohne etwas dafür tun zu müssen. Sondern einfach weil du da bist.",7:"Du willst verstanden werden ohne erklären zu müssen.",8:"Du willst Erlaubnis. Die Erlaubnis vollständig zu sein.",9:"Du willst versorgt werden. So wie du es für andere tust: bevor sie fragen.",11:"Du willst auf einem Niveau kommunizieren, auf dem du nicht ständig übersetzen musst.",22:"Etwas bauen, das nach dir bleibt. Als Beweis, dass die Vision real war.",33:"Einmal nicht die Stärkste sein müssen."};
var BM={1:"Du übernimmst. Nicht weil niemand anderes es tut — sondern weil es sich falsch anfühlt zu warten.",2:"Du passt dich an. Du weißt was dein Partner braucht, noch bevor er es ausspricht.",3:"Du machst alles leicht. Konflikte werden gelöst mit Humor.",4:"Du bist der verlässlichste Mensch in jeder Beziehung die du führst.",5:"Du fällst schnell. Du gehst schneller. Nicht weil du nicht fühlst — sondern weil Nähe sich wie eine Tür anfühlen kann.",6:"Du gibst — bevor jemand fragt. Du spürst was dein Partner braucht.",7:"Du bietest Tiefe — und schützt sie mit Abstand.",8:"Du bringst Intensität. Du bist ganz da, oder du bist weg.",9:"Du gehst in jede Beziehung mit vollem Herzen. Und du verschwindest langsam darin.",11:"Du spürst was dein Partner fühlt — manchmal bevor er es selbst weiß.",22:"Du siehst was möglich ist — in Menschen, in Situationen, in Beziehungen.",33:"Du siehst was der andere braucht — oft bevor er es selbst sieht."};
var AZ={1:"Du nimmst Raum ein — nicht weil du es versuchst, sondern weil du so wirkst. Direkt. Sicher. Klar.",2:"Du machst andere comfortable. Du liest Räume, passt dich an.",3:"Du machst Dinge leicht. Probleme kleiner. Räume wärmer.",4:"Du wirkst geerdet. Stabil. Verlässlich.",5:"Du wirkst lebendig. Ungebunden. Als hättest du eine Welt gewählt die größer ist.",6:"Du wirkst wie jemand, bei dem man ankommen kann.",7:"Du wirkst nachdenklich. Wie jemand, der mehr sieht als er sagt.",8:"Du strahlst aus: ich habe das im Griff. Und jeder glaubt dir.",9:"Du wirkst offen. Zugänglich. Als würde man mit allem kommen können.",11:"Du wirkst als würdest du Menschen verstehen bevor sie sich selbst verstehen.",22:"Du wirkst orientiert. Als würdest du wissen wohin es geht.",33:"Du wirkst wie jemand, bei dem man ankommen kann."};

// ── MATH ─────────────────────────────────────────────────────────
function red(n,km){var ms=[11,22,33];while(n>9){if(km&&ms.indexOf(n)>-1)break;var s=0;String(n).split('').forEach(function(d){s+=parseInt(d);});n=s;}return n;}
function charVal(c){var t={A:1,B:2,C:3,D:4,E:5,F:6,G:7,H:8,I:9,J:1,K:2,L:3,M:4,N:5,O:6,P:7,Q:8,R:9,S:1,T:2,U:3,V:4,W:5,X:6,Y:7,Z:8};return t[c.toUpperCase()]||0;}
function calc(fn,ln,bd){
  var p=bd.split('-'),yr=parseInt(p[0]),mo=parseInt(p[1]),dy=parseInt(p[2]);
  var ds=String(dy).padStart(2,'0')+String(mo).padStart(2,'0')+String(yr);
  var lz=red(ds.split('').reduce(function(a,b){return a+parseInt(b);},0),true);
  var full=(fn+ln).replace(/[^a-zA-Z]/g,'');
  var av=[];
  full.split('').forEach(function(ch){var v=charVal(ch);if(v>0)av.push(v);});
  var az=red(av.reduce(function(a,b){return a+b;},0)||1,true);
  var cy=new Date().getFullYear(),age=cy-yr;
  var cn=Math.min(Math.floor(age/13)+1,6);
  var cs=yr+(cn-1)*13,ce=cs+12;
  var yl=Math.max(0,ce-cy+1),yc=age-(cn-1)*13+1;
  var pct=Math.min(Math.round(yc/13*100),100);
  var pj=red(dy+mo+cy,false);
  return{lz:lz,az:az,yr:yr,mo:mo,dy:dy,cn:cn,cs:cs,ce:ce,yl:yl,yc:yc,pct:pct,pj:pj};
}

document.getElementById('soulForm').addEventListener('submit',function(e){

  if(!fn||!ln||!bd||!bp){alert('Bitte alle Pflichtfelder ausfüllen.');return;}
  if(!ds){alert('Bitte Datenschutzerklärung akzeptieren.');return;}
  var btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.innerHTML='✦ Analysiere...';
  // Save all profile data — needed to restore after checkout
  localStorage.setItem('aevima_first_name',fn);
  localStorage.setItem('aevima_profile_fname',fn);
  localStorage.setItem('aevima_profile_lname',ln);
  localStorage.setItem('aevima_profile_bdate',bd);
  localStorage.setItem('aevima_profile_bplace',bp);
  setTimeout(function(){buildResult(fn,ln,bd,bp);btn.disabled=false;btn.innerHTML='✦ Analyse starten';},800);
});
