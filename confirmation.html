<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zugang bestätigt — AEVIMA</title>
  <link rel="preconnect" href="https://fonts.bunny.net"/>
  <link href="https://fonts.bunny.net/css?family=cinzel:400,600,700|raleway:300,400,500,600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --black:#0F0E14;--night:#18161F;--off-white:#EDE9E2;--muted:#8B7FA0;
      --emerald:#1E7A52;--emerald-h:#2AA06D;--teal:#2AAFA0;
      --rose:#C4956A;--rose-l:#E8C4A0;
    }
    body{background:var(--black);color:var(--off-white);font-family:'Raleway',sans-serif;font-weight:300;line-height:1.8;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .wrap{max-width:480px;width:100%;padding:48px 24px;text-align:center}

    /* SYMBOL ANIMATION */
    .symbol-wrap{margin-bottom:32px;display:flex;justify-content:center}
    .aevima-symbol{width:80px;height:80px;animation:symbolReveal 2s ease-out forwards}
    @keyframes symbolReveal{
      0%{opacity:0;transform:scale(.6)}
      50%{opacity:.8;transform:scale(1.05)}
      100%{opacity:1;transform:scale(1)}
    }
    .symbol-paths path{stroke-dasharray:200;stroke-dashoffset:200;animation:drawPath 1.8s ease-out forwards}
    .symbol-paths path:nth-child(1){animation-delay:.2s}
    .symbol-paths path:nth-child(2){animation-delay:.5s}
    .symbol-paths path:nth-child(3){animation-delay:.8s}
    .symbol-paths path:nth-child(4){animation-delay:1.1s}
    @keyframes drawPath{to{stroke-dashoffset:0}}

    .confirm-title{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.25em;color:var(--muted);text-transform:uppercase;margin-bottom:20px}
    .confirm-text{color:var(--muted);font-size:.92rem;line-height:1.9;margin-bottom:32px;max-width:360px;margin-left:auto;margin-right:auto}

    .btn-profile{display:block;padding:17px 48px;background:linear-gradient(135deg,var(--emerald),#167044);color:var(--off-white);border:none;border-radius:2px;font-family:'Cinzel',serif;font-size:.82rem;font-weight:700;letter-spacing:.22em;cursor:pointer;transition:all .3s;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:52px;margin-bottom:16px}
    .btn-profile:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(30,122,82,.35)}

    .email-note{color:var(--muted);font-size:.78rem}
    .redirect-note{color:var(--muted);font-size:.72rem;margin-top:12px;opacity:.6}

    /* Countdown */
    #countdown{color:var(--teal)}
  </style>
</head>
<body>
<div class="wrap">

  <div class="symbol-wrap">
    <svg class="aevima-symbol" viewBox="0 0 80 80" style="width:100px;height:100px" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g class="symbol-paths">
        <path d="M40 40C40 40 24 24 16 24C8 24 8 32 8 40C8 48 8 56 16 56C24 56 40 40 40 40Z" stroke="#C4956A" stroke-width="1.8" fill="none"/>
        <path d="M40 40C40 40 56 56 64 56C72 56 72 48 72 40C72 32 72 24 64 24C56 24 40 40 40 40Z" stroke="#C4956A" stroke-width="1.8" fill="none"/>
        <path d="M40 40C40 40 24 56 24 64C24 72 32 72 40 72C48 72 56 72 56 64C56 56 40 40 40 40Z" stroke="#E8C4A0" stroke-width="1.2" fill="none"/>
        <path d="M40 40C40 40 56 24 56 16C56 8 48 8 40 8C32 8 24 8 24 16C24 24 40 40 40 40Z" stroke="#E8C4A0" stroke-width="1.2" fill="none"/>
      </g>
    </svg>
  </div>

  <div class="confirm-title">Was bleibt</div>

  <div class="confirm-text">
    Deine vollständige Analyse ist jetzt sichtbar.
  </div>

  <a href="seelenprofil-v2.html?test=1" class="btn-profile">✦ Mein Profil lesen</a>

  <div class="email-note">Eine Bestätigung wurde an deine E-Mail gesendet.</div>
  <div class="redirect-note">Weiter in <span id="countdown">5</span> Sekunden...</div>

</div>

<script>
// Auto-redirect countdown
var c = 5;
var t = setInterval(function(){
  c--;
  document.getElementById('countdown').textContent = c;
  if(c <= 0){
    clearInterval(t);
    window.location.href = 'seelenprofil-v2.html?test=1';
  }
}, 1000);
</script>
</body>
</html>
