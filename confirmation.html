<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zugang bestätigt — AEVIMA</title>
  <link rel="preconnect" href="https://fonts.bunny.net"/>
  <link href="https://fonts.bunny.net/css?family=cinzel:400,600,700|raleway:300,400,500,600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --black:#0F0E14;--off-white:#EDE9E2;--muted:#9B8FA8;
      --emerald:#1E7A52;--teal:#2AAFA0;--rose:#C4956A;--rose-l:#E8C4A0;
    }
    body{
      background:var(--black);color:var(--off-white);
      font-family:'Raleway',sans-serif;font-weight:300;line-height:1.8;
      min-height:100vh;display:flex;align-items:center;justify-content:center
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:radial-gradient(ellipse at 50% 40%,rgba(30,122,82,.08) 0,transparent 60%);
      pointer-events:none
    }
    .wrap{position:relative;z-index:1;max-width:440px;width:100%;padding:48px 24px;text-align:center}

    /* SYMBOL ANIMATION */
    .sym-anim{margin-bottom:36px;display:flex;justify-content:center}
    .sym-anim svg{
      filter:drop-shadow(0 0 28px rgba(196,149,106,.45));
      animation:arrive 2.2s ease-out forwards;
      opacity:0;transform:scale(.5)
    }
    @keyframes arrive{
      0%{opacity:0;transform:scale(.5)}
      60%{opacity:1;transform:scale(1.06)}
      80%{transform:scale(.97)}
      100%{opacity:1;transform:scale(1)}
    }

    /* PATHS draw in */
    .sym-anim path{stroke-dasharray:300;stroke-dashoffset:300;animation:draw 1.6s ease-out forwards}
    .sym-anim path:nth-child(1){animation-delay:.3s}
    .sym-anim path:nth-child(2){animation-delay:.6s}
    .sym-anim path:nth-child(3){animation-delay:.9s}
    .sym-anim path:nth-child(4){animation-delay:1.2s}
    @keyframes draw{to{stroke-dashoffset:0}}

    .label{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;margin-bottom:22px;animation:fade-in .8s 1.8s both}
    .msg{color:var(--muted);font-size:.92rem;line-height:1.9;max-width:340px;margin:0 auto 32px;animation:fade-in .8s 2s both}

    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:16px 48px;
      background:linear-gradient(135deg,var(--emerald),#16704A);
      color:var(--off-white);border:none;border-radius:2px;
      font-family:'Cinzel',serif;font-size:.8rem;font-weight:700;letter-spacing:.22em;
      cursor:pointer;transition:all .25s;min-height:52px;
      animation:fade-in .8s 2.2s both
    }
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(30,122,82,.4)}

    .email-note{color:var(--muted);font-size:.76rem;margin-top:14px;animation:fade-in .8s 2.4s both}
    .redirect{color:var(--muted);font-size:.7rem;margin-top:10px;opacity:.55;animation:fade-in .8s 2.6s both}

    @keyframes fade-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    /* Quote */
    .quote{
      font-size:.92rem;color:var(--off-white);line-height:1.9;
      font-style:italic;margin-bottom:28px;
      animation:fade-in .8s 2s both
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="sym-anim">
    <img src="logo.png" alt="AEVIMA" style="max-width:140px;height:auto;filter:drop-shadow(0 0 28px rgba(196,149,106,.45));animation:arrive 2.2s ease-out forwards;opacity:0"/>
  </div>

  <div id="danke" style="font-family:'Cinzel',serif;font-size:1.2rem;color:var(--rose-l);letter-spacing:.1em;margin-bottom:20px">Danke.</div>

  <div class="quote">Deine vollständige Analyse<br>ist jetzt sichtbar.</div>

  <div class="msg" style="margin-top:8px;font-size:.82rem;color:var(--muted)">Kein Zufall. Dein Weg.</div>

  <a href="premium.html" class="btn">✦ Mein Profil lesen</a>

  <div class="email-note">Eine Bestätigung wurde an deine E-Mail gesendet.</div>
  <div class="redirect">Weiterleitung in <span id="cd">5</span> Sekunden...</div>

</div>
<script>
// Personalisierung
(function(){
  var name = localStorage.getItem('aevima_first_name');
  var el = document.getElementById('danke');
  if(el && name) el.textContent = 'Danke, ' + name + '.';
})();
var n=5;
var t=setInterval(function(){
  n--;
  document.getElementById('cd').textContent=n;
  if(n<=0){clearInterval(t);location.href='premium.html'}
},1000);
</script>
</body>
</html>
